<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Decode QR</title>

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- QR Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
      body {
        background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
      }

      .card {
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-5">
          <div class="card p-4 text-center">

            <h4 class="mb-3">🔓 Decode Secret QR</h4>

            <!-- 📷 Scanner -->
            <div id="reader" style="width: 100%;"></div>

            <!-- ✅ Status Message -->
            <p id="scanStatus" class="text-success small mt-2" style="display:none;">
              ✅ QR Scanned Successfully
            </p>

            <p class="text-muted small mt-2">
              Scan QR or it will auto-fill if opened from link
            </p>

            <!-- 🔐 Form -->
            <form method="POST" class="mt-3">

              <!-- Hidden field -->
              <input
                type="hidden"
                name="encoded"
                id="encoded"
                value="{{ encoded_text }}"
              />

              <input
                type="password"
                name="password"
                class="form-control mb-3"
                placeholder="Enter Password"
                required
              />

              <button class="btn btn-dark w-100">
                Unlock 🔓
              </button>
            </form>

            <!-- RESULT -->
            {% if message %}
              <div class="alert alert-success mt-3">
                {{ message }}
              </div>
            {% endif %}

          </div>
        </div>
      </div>
    </div>

    <!-- JS -->
    <script>
      function onScanSuccess(decodedText) {
        let finalData = decodedText;

        // ✅ If QR contains URL → extract data
        if (decodedText.includes("data=")) {
          const url = new URL(decodedText);
          finalData = url.searchParams.get("data");
        }

        // Set hidden field
        document.getElementById("encoded").value = finalData;

        // Show success message (no alert)
        document.getElementById("scanStatus").style.display = "block";
      }

      let scanner = new Html5QrcodeScanner("reader", {
        fps: 10,
        qrbox: 250,
      });

      scanner.render(onScanSuccess);
    </script>

  </body>
</html>
