<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QR Generator</title>

    <link
      rel="icon"
      href="https://cdn-icons-png.flaticon.com/512/159/159469.png"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
      }

      .card {
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      }

      .qr-img {
        border-radius: 10px;
        padding: 10px;
        background: #fff;
      }

      .color-box {
        background: #f8f9fa;
        padding: 10px;
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-6">
          <div class="card p-4 text-center">
            <h2 class="mb-2">🔳 QR Code Generator</h2>
            <p class="text-muted mb-3">
              Generate different types of QR codes easily
            </p>

            <!-- Form -->
            <form method="POST">
              <!-- Type -->
              <select
                name="type"
                class="form-select mb-3"
                onchange="showFields(this.value)"
              >
                <option value="secret">🔐 Secret Message</option>
                <option value="url">🌐 URL</option>
                <option value="email">📧 Email</option>
                <option value="phone">📞 Phone</option>
                <option value="wifi">📶 WiFi</option>
                <option value="location">📍 Location</option>
              </select>

              <!-- SECRET -->
              <div id="secret">
                <input
                  name="message"
                  class="form-control mb-2"
                  placeholder="Enter Secret Message"
                />
                <div class="input-group mb-2">
                  <input
                    type="password"
                    id="secret_password"
                    name="secret_password"
                    class="form-control"
                    placeholder="Set Password"
                  />

                  <button
                    type="button"
                    class="btn btn-outline-secondary"
                    onclick="togglePassword(this)"
                  >
                    👁️
                  </button>
                </div>
                <p class="text-muted small">
                  ⚠️ Remember your password. It cannot be recovered.
                </p>
              </div>

              <!-- URL -->
              <div id="url" style="display: none">
                <input
                  name="url"
                  class="form-control mb-3"
                  placeholder="Enter URL"
                />
              </div>

              <!-- EMAIL -->
              <div id="email" style="display: none">
                <input
                  name="email"
                  class="form-control mb-3"
                  placeholder="Enter Email"
                />
              </div>

              <!-- PHONE -->
              <div id="phone" style="display: none">
                <input
                  name="phone"
                  class="form-control mb-3"
                  placeholder="Enter Phone"
                />
              </div>

              <!-- WIFI -->
              <div id="wifi" style="display: none">
                <input
                  name="ssid"
                  class="form-control mb-2"
                  placeholder="WiFi Name (SSID)"
                />
                <input
                  name="wifi_password"
                  class="form-control mb-3"
                  placeholder="Password"
                />
              </div>

              <!-- LOCATION -->
              <div id="location" style="display: none">
                <input
                  name="lat"
                  class="form-control mb-2"
                  placeholder="Latitude"
                />
                <input
                  name="long"
                  class="form-control mb-3"
                  placeholder="Longitude"
                />
              </div>

              <!-- 🎨 COLOR PICKERS (FIXED POSITION) -->
              <div class="color-box mb-3">
                <div class="row">
                  <div class="col-6 text-center">
                    <label class="form-label">QR Color</label><br />
                    <input
                      type="color"
                      name="qr_color"
                      class="form-control form-control-color mx-auto"
                      value="#000000"
                    />
                  </div>

                  <div class="col-6 text-center">
                    <label class="form-label">Background</label><br />
                    <input
                      type="color"
                      name="bg_color"
                      class="form-control form-control-color mx-auto"
                      value="#ffffff"
                    />
                  </div>
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100">
                Generate QR 🚀
              </button>
            </form>

            <!-- RESULT -->
            {% if img_name %}
            <div class="mt-4">
              <h5>Your QR Code</h5>

              <img
                src="{{ url_for('static', filename=img_name) }}"
                class="img-fluid qr-img mt-2"
                style="max-width: 220px"
              />

              <div class="row mt-3 g-2">
                <div class="col-12 col-md-4">
                  <a
                    href="{{ url_for('static', filename=img_name) }}"
                    download
                    class="btn btn-success w-100"
                  >
                    Download ⬇️
                  </a>
                </div>

                <div class="col-12 col-md-4">
                  <button onclick="copyQR()" class="btn btn-secondary w-100">
                    Copy 📋
                  </button>
                </div>

                <div class="col-12 col-md-4">
                  <a href="/decode" class="btn btn-dark w-100"> Decode 🔓 </a>
                </div>
              </div>
            </div>
            {% endif %}
          </div>
        </div>
      </div>
    </div>

    <!-- JS -->
    <script>
      function showFields(type) {
        document.getElementById("secret").style.display = "none";
        document.getElementById("url").style.display = "none";
        document.getElementById("email").style.display = "none";
        document.getElementById("phone").style.display = "none";
        document.getElementById("wifi").style.display = "none";
        document.getElementById("location").style.display = "none";

        document.getElementById(type).style.display = "block";
      }
      function togglePassword(btn) {
        const input = document.getElementById("secret_password");

        if (input.type === "password") {
          input.type = "text";
          btn.innerHTML = "🙈";
        } else {
          input.type = "password";
          btn.innerHTML = "👁️";
        }
      }
      async function copyQR() {
        const img = document.querySelector(".qr-img");

        try {
          const response = await fetch(img.src);
          const blob = await response.blob();

          await navigator.clipboard.write([
            new ClipboardItem({ "image/png": blob }),
          ]);

          alert("QR copied! Paste it anywhere 👍");
        } catch (err) {
          alert("Copy not supported ❌");
        }
      }
    </script>
  </body>
</html>
